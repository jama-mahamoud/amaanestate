<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>AmaanEstate</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <link rel="apple-touch-icon" href="/house_luxury_icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        console.error('Global Error:', { message, source, lineno, colno, error });
        document.body.innerHTML += '<div style="position:fixed;bottom:0;left:0;background:red;color:white;padding:10px;z-index:9999;">Error: ' + message + '</div>';
      };
      window.addEventListener('unhandledrejection', event => {
        console.error('Unhandled Promise Rejection:', event.reason);
      });
    </script>
  </body>
</html>
